<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy - Online Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .nav-link { position: relative; }
        .nav-link:after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background-color: #3b82f6; transition: width 0.3s; }
        .nav-link:hover:after { width: 100%; }
        .cart-count { animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">S</div>
                <h1 class="text-2xl font-semibold text-gray-900">ShopEasy</h1>
            </div>
            
            <div class="flex items-center gap-8">
                <div onclick="navigateTo('home')" class="nav-link cursor-pointer text-gray-600 hover:text-gray-900 font-medium flex items-center gap-1">
                    <i class="fas fa-home"></i> Shop
                </div>
                <div onclick="navigateTo('cart')" class="nav-link cursor-pointer text-gray-600 hover:text-gray-900 font-medium flex items-center gap-1 relative">
                    <i class="fas fa-shopping-cart"></i> Cart
                    <span id="cart-count" class="cart-count absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                </div>
                <div onclick="navigateTo('orders')" class="nav-link cursor-pointer text-gray-600 hover:text-gray-900 font-medium flex items-center gap-1">
                    <i class="fas fa-truck"></i> Orders
                </div>
                
                <div class="flex items-center gap-3">
                    <div id="user-info" class="hidden items-center gap-2 cursor-pointer" onclick="toggleProfileMenu()">
                        <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-sm font-medium" id="user-avatar">U</div>
                        <span id="username-display" class="font-medium text-sm"></span>
                    </div>
                    <button onclick="showLoginModal()" id="login-btn"
                            class="px-5 py-2 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition-colors font-medium">
                        Login
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- HOME / PRODUCT CATALOG -->
        <div id="home-view">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-4xl font-semibold text-gray-900">Featured Products</h2>
                    <p class="text-gray-500 mt-1">Discover our best sellers</p>
                </div>
                
                <!-- Admin Button -->
                <button onclick="showAdminPanel()" id="admin-btn" 
                        class="hidden px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl text-sm font-semibold flex items-center gap-2">
                    <i class="fas fa-cog"></i> Admin Panel
                </button>
            </div>

            <!-- Search & Filter -->
            <div class="flex gap-4 mb-8">
                <div class="flex-1 relative">
                    <input id="search-input" 
                           onkeyup="filterProducts()"
                           type="text" 
                           placeholder="Search products..." 
                           class="w-full pl-12 py-4 bg-white border border-gray-200 rounded-3xl focus:outline-none focus:border-blue-500 text-lg">
                    <i class="fas fa-search absolute left-5 top-4 text-gray-400"></i>
                </div>
                <select id="category-filter" onchange="filterProducts()" 
                        class="px-8 py-4 bg-white border border-gray-200 rounded-3xl focus:outline-none">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="home">Home & Living</option>
                </select>
            </div>

            <!-- Product Grid -->
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- CART VIEW -->
        <div id="cart-view" class="hidden">
            <h2 class="text-4xl font-semibold mb-8">Your Cart</h2>
            <div id="cart-items" class="space-y-6">
                <!-- Populated by JS -->
            </div>
            
            <div class="mt-12 border-t pt-8">
                <div class="flex justify-between text-xl mb-2">
                    <span class="font-medium text-gray-600">Subtotal</span>
                    <span id="cart-subtotal" class="font-semibold">$0.00</span>
                </div>
                <div class="flex justify-between text-3xl font-bold mt-6 mb-8">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
                
                <button onclick="checkout()" 
                        class="w-full py-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-xl font-semibold rounded-3xl hover:brightness-105 transition">
                    Proceed to Checkout
                </button>
            </div>
        </div>

        <!-- ORDERS VIEW -->
        <div id="orders-view" class="hidden">
            <h2 class="text-4xl font-semibold mb-8">Order History</h2>
            <div id="orders-list" class="space-y-6">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin-view" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-semibold">Admin Panel - Product Management</h2>
                <button onclick="hideAdminPanel()" 
                        class="px-6 py-3 text-gray-600 hover:bg-gray-100 rounded-2xl flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Back to Shop
                </button>
            </div>
            
            <div class="bg-white rounded-3xl p-8 shadow-sm">
                <h3 class="font-semibold text-lg mb-6">Add New Product</h3>
                <div class="grid grid-cols-2 gap-6">
                    <input id="new-name" placeholder="Product Name" class="px-6 py-4 border border-gray-200 rounded-2xl">
                    <input id="new-price" type="number" placeholder="Price" class="px-6 py-4 border border-gray-200 rounded-2xl">
                    <input id="new-category" placeholder="Category" class="px-6 py-4 border border-gray-200 rounded-2xl">
                    <input id="new-image" placeholder="Image URL (use unsplash or placeholder)" class="px-6 py-4 border border-gray-200 rounded-2xl">
                </div>
                <button onclick="addProduct()" 
                        class="mt-6 px-8 py-4 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700">
                    Add Product
                </button>
            </div>
            
            <div class="mt-12">
                <h3 class="font-semibold text-lg mb-6">Current Products</h3>
                <div id="admin-product-list" class="space-y-4">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md">
            <h3 class="text-2xl font-semibold mb-6">Login</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-500 mb-1">Username</label>
                    <input id="login-username" value="user" 
                           class="w-full px-6 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-500 mb-1">Password</label>
                    <input id="login-password" type="password" value="123" 
                           class="w-full px-6 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-blue-500">
                </div>
            </div>
            
            <div class="flex gap-3 mt-8">
                <button onclick="login()" 
                        class="flex-1 py-4 bg-blue-600 text-white font-semibold rounded-2xl">Login as User</button>
                <button onclick="loginAsAdmin()" 
                        class="flex-1 py-4 bg-emerald-600 text-white font-semibold rounded-2xl">Login as Admin</button>
            </div>
            
            <button onclick="hideLoginModal()" 
                    class="mt-4 w-full py-3 text-gray-500 hover:text-gray-700">Cancel</button>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3">
        <i class="fas fa-check-circle"></i>
        <span id="toast-text"></span>
    </div>

    <script>
        // Sample Products
        let products = [
            {
                id: 1,
                name: "Wireless Headphones",
                price: 89.99,
                category: "electronics",
                image: "https://picsum.photos/id/20/300/300",
                description: "Premium noise cancelling headphones"
            },
            {
                id: 2,
                name: "Denim Jacket",
                price: 59.99,
                category: "fashion",
                image: "https://picsum.photos/id/64/300/300",
                description: "Classic blue denim jacket"
            },
            {
                id: 3,
                name: "Smart Watch",
                price: 199.99,
                category: "electronics",
                image: "https://picsum.photos/id/201/300/300",
                description: "Fitness tracking & notifications"
            },
            {
                id: 4,
                name: "Ceramic Mug Set",
                price: 24.99,
                category: "home",
                image: "https://picsum.photos/id/251/300/300",
                description: "Set of 4 minimalist mugs"
            },
            {
                id: 5,
                name: "Leather Sneakers",
                price: 79.99,
                category: "fashion",
                image: "https://picsum.photos/id/201/300/300",
                description: "Comfortable everyday sneakers"
            }
        ];

        let cart = [];
        let orders = [];
        let currentUser = null;

        // Render Products
        function renderProducts(filteredProducts) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-3xl overflow-hidden border border-gray-100';
                card.innerHTML = `
                    <img src="${product.image}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-semibold text-lg">${product.name}</h3>
                                <p class="text-emerald-600 font-medium">$${product.price}</p>
                            </div>
                            <span class="text-xs bg-gray-100 px-3 py-1 rounded-full">${product.category}</span>
                        </div>
                        <p class="text-gray-500 text-sm mt-3 line-clamp-2">${product.description}</p>
                        <button onclick="addToCart(${product.id})" 
                                class="mt-6 w-full py-3 bg-gray-900 hover:bg-black text-white rounded-2xl text-sm font-semibold transition">
                            Add to Cart
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterProducts() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const category = document.getElementById('category-filter').value;
            
            const filtered = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
                                    product.description.toLowerCase().includes(searchTerm);
                const matchesCategory = !category || product.category === category;
                return matchesSearch && matchesCategory;
            });
            
            renderProducts(filtered);
        }

        // Cart Functions
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity = (existing.quantity || 1) + 1;
            } else {
                cart.push({...product, quantity: 1});
            }
            
            updateCartCount();
            showToast(`${product.name} added to cart`);
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            document.getElementById('cart-count').textContent = count;
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-shopping-cart text-7xl text-gray-200 mb-6"></i>
                        <p class="text-gray-400 text-xl">Your cart is empty</p>
                        <button onclick="navigateTo('home')" 
                                class="mt-8 px-8 py-4 bg-blue-600 text-white rounded-2xl">Start Shopping</button>
                    </div>
                `;
                document.getElementById('cart-subtotal').textContent = '$0.00';
                document.getElementById('cart-total').textContent = '$0.00';
                return;
            }
            
            let subtotal = 0;
            
            cart.forEach((item, index) => {
                const itemTotal = item.price * (item.quantity || 1);
                subtotal += itemTotal;
                
                const div = document.createElement('div');
                div.className = 'flex gap-6 bg-white p-6 rounded-3xl';
                div.innerHTML = `
                    <img src="${item.image}" class="w-24 h-24 object-cover rounded-2xl">
                    <div class="flex-1">
                        <div class="flex justify-between">
                            <div>
                                <h4 class="font-semibold">${item.name}</h4>
                                <p class="text-sm text-gray-500">$${item.price}</p>
                            </div>
                            <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        
                        <div class="flex items-center gap-6 mt-6">
                            <div class="flex border border-gray-200 rounded-2xl">
                                <button onclick="changeQuantity(${index}, -1)" class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-l-2xl">-</button>
                                <div class="w-12 flex items-center justify-center font-medium">${item.quantity || 1}</div>
                                <button onclick="changeQuantity(${index}, 1)" class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-r-2xl">+</button>
                            </div>
                            <div class="font-semibold ml-auto">$${(item.price * (item.quantity || 1)).toFixed(2)}</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('cart-subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('cart-total').textContent = `$${(subtotal + 8.99).toFixed(2)}`;
        }

        function changeQuantity(index, change) {
            cart[index].quantity = Math.max(1, (cart[index].quantity || 1) + change);
            renderCart();
            updateCartCount();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
            updateCartCount();
        }

        function checkout() {
            if (cart.length === 0) return;
            
            const order = {
                id: 'ORD-' + Date.now().toString().slice(-6),
                date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }),
                items: [...cart],
                total: cart.reduce((sum, item) => sum + item.price * (item.quantity || 1), 0) + 8.99,
                status: 'Processing'
            };
            
            orders.unshift(order);
            cart = [];
            
            updateCartCount();
            showToast('Order placed successfully! 🎉');
            navigateTo('orders');
        }

        function renderOrders() {
            const container = document.getElementById('orders-list');
            container.innerHTML = '';
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-3xl">
                        <i class="fas fa-box text-6xl text-gray-200"></i>
                        <p class="mt-6 text-gray-400">No orders yet</p>
                    </div>
                `;
                return;
            }
            
            orders.forEach(order => {
                const div = document.createElement('div');
                div.className = 'bg-white rounded-3xl p-8';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-mono text-sm text-emerald-600">${order.id}</span>
                            <p class="text-gray-400 text-sm mt-1">${order.date}</p>
                        </div>
                        <span class="px-5 py-1.5 bg-emerald-100 text-emerald-700 text-sm font-medium rounded-2xl">${order.status}</span>
                    </div>
                    
                    <div class="mt-8 grid grid-cols-2 md:grid-cols-4 gap-6">
                        ${order.items.map(item => `
                            <div class="flex gap-4">
                                <img src="${item.image}" class="w-14 h-14 object-cover rounded-xl">
                                <div class="text-sm">
                                    <div class="font-medium">${item.name}</div>
                                    <div class="text-gray-500">x${item.quantity || 1}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="text-right mt-6 pt-6 border-t font-semibold">
                        Total: $${order.total.toFixed(2)}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Admin
        function showAdminPanel() {
            if (!currentUser || currentUser.role !== 'admin') return;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('cart-view').classList.add('hidden');
            document.getElementById('orders-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            renderAdminProducts();
        }

        function hideAdminPanel() {
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
        }

        function renderAdminProducts() {
            const container = document.getElementById('admin-product-list');
            container.innerHTML = '';
            
            products.forEach((product, index) => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-6 bg-gray-50 p-5 rounded-2xl';
                div.innerHTML = `
                    <img src="${product.image}" class="w-20 h-20 object-cover rounded-2xl">
                    <div class="flex-1">
                        <div class="font-medium">${product.name}</div>
                        <div class="text-emerald-600">$${product.price}</div>
                    </div>
                    <button onclick="deleteProduct(${index})" 
                            class="px-6 py-3 text-red-500 hover:bg-red-50 rounded-2xl">Delete</button>
                `;
                container.appendChild(div);
            });
        }

        function addProduct() {
            const name = document.getElementById('new-name').value.trim();
            const price = parseFloat(document.getElementById('new-price').value);
            const category = document.getElementById('new-category').value.trim().toLowerCase();
            let image = document.getElementById('new-image').value.trim();
            
            if (!name || !price || !category) {
                showToast('Please fill all fields', true);
                return;
            }
            
            if (!image) image = `https://picsum.photos/id/${Math.floor(Math.random()*300)}/300/300`;
            
            const newProduct = {
                id: Date.now(),
                name,
                price,
                category,
                image,
                description: "New product added by admin"
            };
            
            products.unshift(newProduct);
            renderProducts(products);
            renderAdminProducts();
            
            // Clear form
            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-category').value = '';
            document.getElementById('new-image').value = '';
            
            showToast('Product added successfully');
        }

        function deleteProduct(index) {
            if (confirm('Delete this product?')) {
                products.splice(index, 1);
                renderProducts(products);
                renderAdminProducts();
            }
        }

        // Navigation
        function navigateTo(view) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('cart-view').classList.add('hidden');
            document.getElementById('orders-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            
            if (view === 'home') {
                document.getElementById('home-view').classList.remove('hidden');
            } else if (view === 'cart') {
                document.getElementById('cart-view').classList.remove('hidden');
                renderCart();
            } else if (view === 'orders') {
                document.getElementById('orders-view').classList.remove('hidden');
                renderOrders();
            }
        }

        // Auth
        function showLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
        }

        function hideLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
        }

        function login() {
            const username = document.getElementById('login-username').value || 'user';
            currentUser = { username, role: 'user' };
            updateUIAfterLogin();
            hideLoginModal();
        }

        function loginAsAdmin() {
            currentUser = { username: 'admin', role: 'admin' };
            updateUIAfterLogin();
            hideLoginModal();
        }

        function updateUIAfterLogin() {
            document.getElementById('login-btn').classList.add('hidden');
            const userInfo = document.getElementById('user-info');
            userInfo.classList.remove('hidden');
            document.getElementById('username-display').textContent = currentUser.username;
            
            if (currentUser.role === 'admin') {
                document.getElementById('admin-btn').classList.remove('hidden');
            }
            
            showToast(`Welcome back, ${currentUser.username}!`);
        }

        function toggleProfileMenu() {
            if (confirm('Logout?')) {
                currentUser = null;
                document.getElementById('login-btn').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('admin-btn').classList.add('hidden');
                showToast('Logged out');
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toast-text');
            text.textContent = message;
            
            if (isError) {
                toast.classList.remove('bg-emerald-600');
                toast.classList.add('bg-red-500');
            } else {
                toast.classList.add('bg-emerald-600');
                toast.classList.remove('bg-red-500');
            }
            
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // Initialize
        function init() {
            renderProducts(products);
            updateCartCount();
            
            // Demo order for testing
            if (orders.length === 0) {
                orders.push({
                    id: 'ORD-784912',
                    date: 'Jun 18, 2026',
                    items: [products[0]],
                    total: 98.98,
                    status: 'Delivered'
                });
            }
            
            // Keyboard shortcut hint
            console.log('%cShopEasy Demo Ready! 🎉\nTry logging in as "admin" with password "123"', 'color: #3b82f6; font-size: 13px');
        }

        // Start the app
        window.onload = init;
    </script>
</body>
</html>
